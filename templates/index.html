
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Product Recommendation System</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    max-width: 1000px;
    margin: 40px auto;
    padding: 20px;
    background: #f4f6f9;
}

h1 {
    text-align: center;
    margin-bottom: 30px;
    color: #1f2937;
}

.search-box {
    display: flex;
    gap: 10px;
    margin-bottom: 30px;
}

.search-box input {
    flex: 1;
    padding: 14px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 16px;
}

.search-box input:focus {
    outline: none;
    border-color: #2563eb;
}

.search-box button {
    padding: 14px 24px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
    font-weight: bold;
}

.search-box button:hover {
    background: #1d4ed8;
}

.products {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
}

.card {
    background: white;
    padding: 18px;
    border-radius: 12px;
    box-shadow: 0 2px 10px rgba(0,0,0,.08);
    transition: transform .2s;
}

.card:hover {
    transform: translateY(-3px);
}

.card h3 {
    margin-bottom: 10px;
    color: #111827;
}

.card .price {
    color: #2563eb;
    font-weight: bold;
    margin-bottom: 8px;
}

.card p {
    color: #4b5563;
    line-height: 1.5;
}

.recommendation-box {
    margin-top: 35px;
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,.08);
}

.recommendation-box h2 {
    color: #2563eb;
    margin-bottom: 15px;
}

.recommendation-box h3 {
    margin-top: 20px;
    color: #111827;
}

.recommendation-box p {
    line-height: 1.6;
    margin-top: 8px;
}

.recommendation-box ul {
    padding-left: 20px;
    margin-top: 10px;
}

.recommendation-box li {
    margin-bottom: 8px;
}

.loading {
    color: #2563eb;
    font-weight: bold;
}

.empty {
    color: #6b7280;
}
</style>
</head>

<body>

<h1>AI Product Recommendations</h1>

<div class="search-box">
    <input
        type="text"
        id="preference"
        placeholder="Example: I want a phone under $500"
    >

    <button onclick="getRecommendations()">
        Recommend
    </button>
</div>

<div class="products">
    {% for product in products %}
    <div class="card">
        <h3>{{ product.name }}</h3>
        <div class="price">${{ product.price }}</div>
        <p>{{ product.description }}</p>
    </div>
    {% endfor %}
</div>

<div class="recommendation-box">
    <h2>Recommendations</h2>

    <div id="recommendations" class="empty">
        Enter your preferences and click Recommend.
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>

async function getRecommendations() {

    const input =
        document.getElementById("preference");

    const preference =
        input.value.trim();

    if (!preference) {
        alert("Please enter a preference.");
        return;
    }

    const recommendationBox =
        document.getElementById("recommendations");

    recommendationBox.innerHTML =
        '<p class="loading">Generating recommendations...</p>';

    try {

        const response = await fetch("/recommend/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": "{{ csrf_token }}"
            },
            body: JSON.stringify({
                preference: preference
            })
        });

        const data = await response.json();

        if (data.recommendations) {

            recommendationBox.innerHTML =
                marked.parse(data.recommendations);

        } else {

            recommendationBox.innerHTML =
                "<p>No recommendations found.</p>";

        }

        input.value = "";

    } catch (error) {

        recommendationBox.innerHTML =
            "<p>Something went wrong. Please try again.</p>";

    }
}

document
.getElementById("preference")
.addEventListener("keypress", function(event) {

    if (event.key === "Enter") {
        getRecommendations();
    }

});

</script>

</body>
</html>
